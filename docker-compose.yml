# One-command hosting of the baking API:  docker compose up -d
# Then point clients at it:  export AWS_CALC_API_URL=http://<host>:8080
services:
  aws-calc-api:
    build: .
    image: aws-calc-api:latest
    ports:
      - "8080:8080"
    restart: unless-stopped
    # Chromium needs a little shared memory for stability.
    shm_size: "1gb"
